name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject Supabase Key
        run: |
          sed -i "s|__SUPABASE_API_KEY__|${{ secrets.SUPABASE_API_KEY }}|g" script.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          # Ensure GitHub Pages uses the custom domain specified in docs/CNAME
          cname: www.agastyametallix.com
          keep_files: false
