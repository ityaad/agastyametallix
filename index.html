<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agastya Metallix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080808;
      color: #e8e8e8;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle radial glow behind content */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(255,255,255,0.03) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 440px;
      width: 100%;
    }

    /* Logo / wordmark area */
    .wordmark {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 4rem;
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      margin-bottom: 4rem;
      overflow: hidden;
    }

    .progress-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 35%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
      border-radius: 999px;
      animation: slide 2.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    /* Heading */
    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: -0.04em;
      color: #f4f4f4;
      margin-bottom: 1rem;
      line-height: 1.1;
    }

    p {
      font-size: 0.875rem;
      font-weight: 300;
      color: #505050;
      line-height: 1.7;
      margin-bottom: 3rem;
      letter-spacing: 0.01em;
    }

    /* Form */
    .notify-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    input[type="email"] {
      width: 100%;
      padding: 0.8rem 1.1rem;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #e8e8e8;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.3s;
      text-align: center;
    }

    input[type="email"]::placeholder { color: #333; }

    input[type="email"]:focus {
      border-color: rgba(255,255,255,0.2);
    }

    button {
      width: 100%;
      padding: 0.8rem 1.25rem;
      background: rgba(255,255,255,0.06);
      color: #aaa;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }

    button:hover {
      background: rgba(255,255,255,0.1);
      color: #e8e8e8;
      border-color: rgba(255,255,255,0.15);
    }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* Footer */
    .footer {
      margin-top: 4rem;
      font-size: 0.7rem;
      color: #2a2a2a;
      letter-spacing: 0.05em;
    }

    @keyframes slide {
      0%   { transform: translateX(-200%); }
      100% { transform: translateX(400%); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="wordmark">— AGASTYA METALLIX —</div>

    <div class="progress-bar"></div>

    <h1>Coming soon!</h1>
    <p>We're putting the finishing touches on our new experience.<br>Leave your email and we'll let you know when it's ready.</p>

    <form class="notify-form" onsubmit="handleSubmit(event)">
      <input type="email" placeholder="your@email.com" required>
      <button type="submit">Notify me</button>
    </form>

    <div class="footer">&copy; 2026 &mdash; All rights reserved</div>
  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const input = e.target.querySelector('input');
      btn.textContent = 'You\'re on the list';
      btn.disabled = true;
      input.value = '';
      input.disabled = true;
    }
  </script>
</body>
</html>
